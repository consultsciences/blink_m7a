    <!-- Guard: prevent widget.js focus handler crash on Radix synthetic events -->
    <script>
      (function() {
        var _origAddEvt = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function(type, listener, opts) {
          if ((type === 'focusin' || type === 'focus') && typeof listener === 'function') {
            var _orig = listener;
            listener = function(e) {
              try { _orig.call(this, e); } catch(err) {
                if (err && err.message && err.message.indexOf('tagName') !== -1) return;
                throw err;
              }
            };
          }
          return _origAddEvt.call(this, type, listener, opts);
        };
      })();
    </script>
